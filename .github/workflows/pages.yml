name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml numpy markdown pytest
          pip install -e .
      - name: Run model tests (calibration gate)
        run: python -m pytest model/tests/
      - name: Generate latest memo
        run: python -m memo.generator --scenario status_quo --equilibrium nash
      - name: Generate a collision-prompt batch
        run: python -m novelty.collide --scenario status_quo --domains reinsurance-pooling antitrust-consent-decree climate-loss-damage-fund
      - name: Build static site
        run: python tools/build_site.py
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
