# Positions matrix — synthesis of each actor's stance per negotiation issue.
#
# For each (actor, issue) pair where the actor has a meaningful stake:
#   position        — one-sentence stance, preferred direction or target
#   batna_value     — value of the parameter under no-deal (concrete, in issue units)
#   red_line_value  — value beyond which actor cannot accept any deal; null if none
#   weight          — 0-10 importance/intensity for this actor
#   citation        — actor-file relative path + section anchor
#   inferred        — true if no direct public statement supports the stance
#
# Snapshot date: 2026-05-19
# Issue units recap (from issues.yaml):
#   mfn_coverage:                 count Roche SKUs under MFN, range [0,50], default 4
#   ira_mfp_discount:             % discount from list, range [0,80], default 55
#   section_232_rate:             % ad valorem, range [0,100], default 0 (Genentech 0% track)
#   us_manufacturing_share:       % of Roche global capacity, range [20,70], default 40
#   rnd_commitment:               USD bn/yr US R&D, range [3,15], default 8
#   trumprx_skus:                 count Roche SKUs on TrumpRx, range [0,30], default 5
#   intl_ref_pricing_protection:  ordinal 0-10, default 3
#   patient_access:               ordinal 0-10, default 5
#   pipeline_pricing_protocol:    ordinal 0-10, default 0
#   patent_exclusivity:           ordinal 0-10, default 7
#   ip_innovation_protection:     ordinal 0-10, default 7
#   swiss_diplomatic_carveout:    ordinal 0-10, default 6 (Nov 2025 framework: 15% cap + 0% MFN-deal track)
#   swiss_domestic_pricing:       % change vs 2026-05-19 baseline, range [-20,+20], default 0

