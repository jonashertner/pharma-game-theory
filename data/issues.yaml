# Negotiation issues — the 13 dimensions of the deal vector.
#
# Each issue is a coordinate in the deal space. A "deal" is an assignment
# of a value to each of these dimensions.
#
# Per issue:
#   id                — short identifier, used in payoffs.py and positions.yaml
#   name              — human label
#   description       — one-paragraph plain-English meaning
#   units             — what the value represents
#   range             — [lo, hi] feasible interval
#   default           — value as of snapshot (May 19, 2026)
#   direction_for     — for each actor, +1 if higher value is better, -1 if lower, 0 if neutral.
#                       This drives monotonicity tests in the payoff functions.
#   actors_with_stake — list of actor ids who have non-trivial payoff dependence on this issue
#   evidence_anchors  — at least one calibration data point on the (issue → public reality) mapping
#
# Snapshot date: 2026-05-19

snapshot_date: 2026-05-19

actors:
  - roche
  - us-executive
  - us-congress
  - swiss-federal-council
  - swiss-cantons-basel
  - swiss-public-and-domestic-payers
  - novartis
  - pbms-and-payers
  - patient-advocacy
  - eu-reference-pricing
  - biosimilars-competitors
  - investors

issues:

  - id: mfn_coverage
    name: MFN benchmark coverage
    description: |
      How many Roche drugs are subject to MFN-style price-matching to an
      international reference basket, across which US channels (Medicaid,
      Medicare Part B/D, TrumpRx.gov DTC). Higher value = more drugs covered.
    units: count of Roche-Genentech drug SKUs under MFN price matching
    range: [0, 50]
    default: 4   # Xofluza + the initial Dec-2025 MFN-deal SKUs; full Roche IRA-selection-driven additions pending
    direction_for:
      roche: -1
      us-executive: +1
      us-congress: 0     # split (D+ / R-)
      swiss-federal-council: -1
      swiss-cantons-basel: -1
      swiss-public-and-domestic-payers: -1   # because Swiss-side spillover concern, not because they oppose lower US prices in principle
      novartis: -1
      pbms-and-payers: -1   # MFN list-price cuts erode rebate base
      patient-advocacy: +1
      eu-reference-pricing: -1   # MFN benchmark may cause EU price upward pressure to protect US basket
      biosimilars-competitors: -1  # lower brand price reduces biosimilar uptake incentive
      investors: -1
    evidence_anchors:
      - description: Genentech 19-Dec-2025 MFN deal included Xofluza ($168 → $50 via TrumpRx, Medicaid MFN)
        source: https://www.whitehouse.gov/fact-sheets/2025/12/fact-sheet-president-donald-j-trump-announces-largest-developments-to-date-in-bringing-most-favored-nation-pricing-to-american-patients/

  - id: ira_mfp_discount
    name: IRA Maximum Fair Price discount
    description: |
      Weighted-average percentage discount from list price across all Roche/Genentech
      drugs that have been or will be selected under the IRA price-negotiation
      program (Rounds 1, 2, 3, and forward). Higher value = deeper discount =
      worse for Roche, better for Medicare/taxpayers/patients.
    units: percent discount from pre-IRA list price
    range: [0, 80]
    default: 55   # IRA Round 1 averaged ~57% discount per CMS; Round 3 includes Xolair (Roche/Novartis co-marketed)
    direction_for:
      roche: -1
      us-executive: +1
      us-congress: 0
      swiss-federal-council: -1
      swiss-cantons-basel: -1
      swiss-public-and-domestic-payers: 0
      novartis: -1
      pbms-and-payers: -1
      patient-advocacy: +1
      eu-reference-pricing: 0
      biosimilars-competitors: -1
      investors: -1
    evidence_anchors:
      - description: IRA Round 1 prices effective 2026-01-01 averaged ~57% discount; Round 2 prices effective 2027-01-01; Round 3 (incl. Xolair) effective 2028-01-01
        source: https://www.cms.gov/inflation-reduction-act-and-medicare/medicare-drug-price-negotiation

  - id: section_232_rate
    name: Section 232 pharma tariff rate (Swiss-origin imports)
    description: |
      Effective tariff rate applied to Roche/Genentech pharmaceutical imports
      from Switzerland into the US under the April 2, 2026 Section 232
      proclamation. The proclamation has a tiered structure: 0% for firms with
      MFN deal + US-capacity build; 15% under the Swiss framework cap; up to
      100% for non-compliant firms.
    units: percent ad valorem tariff
    range: [0, 100]
    default: 0   # Genentech qualifies under MFN-deal exemption track; sunset 2029-01-20
    direction_for:
      roche: -1
      us-executive: 0   # tariff revenue vs price-pass-through concerns net out
      us-congress: 0
      swiss-federal-council: -1
      swiss-cantons-basel: -1
      swiss-public-and-domestic-payers: -1   # tariff costs may pass into Swiss-export-priced contracts
      novartis: -1
      pbms-and-payers: 0
      patient-advocacy: -1   # tariff → potential price increases
      eu-reference-pricing: 0
      biosimilars-competitors: 0
      investors: -1
    evidence_anchors:
      - description: Section 232 tariff effective 2026-07-31; Swiss framework caps at 15%; firms with MFN deal + US capacity build pay 0% through 2029-01-20
        source: https://www.whitehouse.gov/

  - id: us_manufacturing_share
    name: Manufacturing footprint allocation (US share)
    description: |
      Roche's installed pharmaceutical-manufacturing capacity located in the US
      as a percentage of global capacity. Bidirectional: higher value = better
      US Section-232 compliance, but worse Basel cantonal tax base and Swiss
      employment. This is where the intra-Swiss tension is sharpest.
    units: percent of Roche global pharma manufacturing capacity
    range: [20, 70]
    default: 40   # rough current US share, pre-$50B expansion build-out
    direction_for:
      roche: 0          # neutral on geography; cares about total margin
      us-executive: +1
      us-congress: +1
      swiss-federal-council: -1
      swiss-cantons-basel: -1  # STRONG negative; Basel tax base depends on this
      swiss-public-and-domestic-payers: 0
      novartis: 0
      pbms-and-payers: 0
      patient-advocacy: 0
      eu-reference-pricing: 0
      biosimilars-competitors: 0
      investors: 0   # depends on capex efficiency; ambiguous
    evidence_anchors:
      - description: Roche pledged $50B US investment over 5 years, 2025-04-22
        source: https://www.roche.com/media/releases/

  - id: rnd_commitment
    name: R&D commitments
    description: |
      Roche's total committed annual R&D spend in the US (basic research,
      clinical trial siting). Higher = stronger US biotech-ecosystem deliverable
      to administration; potentially substitutes for Swiss/EU R&D.
    units: USD billion per year US R&D spend
    range: [3, 15]
    default: 8   # rough current Genentech US R&D run rate
    direction_for:
      roche: 0
      us-executive: +1
      us-congress: +1
      swiss-federal-council: -1
      swiss-cantons-basel: -1
      swiss-public-and-domestic-payers: 0
      novartis: 0
      pbms-and-payers: 0
      patient-advocacy: +1
      eu-reference-pricing: -1
      biosimilars-competitors: 0
      investors: 0
    evidence_anchors:
      - description: Genentech is one of largest US biotech R&D sites
        source: https://www.gene.com

  - id: trumprx_skus
    name: TrumpRx.gov DTC participation
    description: |
      Number of Roche/Genentech drug SKUs offered via TrumpRx.gov DTC platform,
      with discount depth as implicit (each SKU has an MFN-aligned price). The
      platform launched 2026-02-05 and is a key visible-win mechanism for the
      administration.
    units: count of Roche-Genentech SKUs on TrumpRx
    range: [0, 30]
    default: 5
    direction_for:
      roche: -1   # erodes channel margins; threatens PBM relationships
      us-executive: +1
      us-congress: 0
      swiss-federal-council: 0
      swiss-cantons-basel: 0
      swiss-public-and-domestic-payers: 0
      novartis: 0
      pbms-and-payers: -1   # disintermediates PBMs
      patient-advocacy: +1
      eu-reference-pricing: -1   # MFN reference basket worsens
      biosimilars-competitors: 0
      investors: -1
    evidence_anchors:
      - description: TrumpRx.gov launched 2026-02-05 with 43 initial drugs; Xofluza on platform
        source: https://www.whitehouse.gov/

  - id: intl_ref_pricing_protection
    name: International reference-pricing protections
    description: |
      Strength of contractual / regulatory mechanisms preventing US pricing
      decisions from flowing into international (esp EU, UK, CH) reference
      baskets via Most-Favored-Customer clauses or transparency requirements.
      0 = full transparency, US prices visible globally; 10 = full confidential
      net-price firewall, US carve-out language.
    units: ordinal 0-10 (0 = fully transparent, 10 = fully firewalled)
    range: [0, 10]
    default: 3   # current state: US list prices visible but net prices via PBM rebates partly confidential; MFN risks raising transparency further
    direction_for:
      roche: +1   # higher protection = better
      us-executive: -1  # admin prefers transparent low US prices flow globally as policy lever
      us-congress: 0
      swiss-federal-council: +1   # protects Swiss prices from US contagion
      swiss-cantons-basel: 0
      swiss-public-and-domestic-payers: 0   # ambivalent: protection helps tax base, but Swiss patients want lower prices
      novartis: +1
      pbms-and-payers: +1   # rebate model relies on confidentiality
      patient-advocacy: -1
      eu-reference-pricing: +1   # protects EU systems from upward pressure
      biosimilars-competitors: -1
      investors: +1
    evidence_anchors:
      - description: Germany Medical Research Act (Jan 2025) allows confidential Erstattungsbetrag with 9% discount + R&D-in-Germany requirement
        source: https://www.g-ba.de

  - id: patient_access
    name: Patient access mechanisms
    description: |
      Strength of patient-access provisions in the deal: out-of-pocket caps,
      patient-assistance program (PAP) scope, coverage guarantees, copay
      smoothing. 0 = nothing; 10 = comprehensive PAP + low OOP cap.
    units: ordinal 0-10
    range: [0, 10]
    default: 5   # IRA OOP cap at $2000 Medicare Part D from 2025 + manufacturer PAPs
    direction_for:
      roche: 0
      us-executive: +1
      us-congress: +1
      swiss-federal-council: 0
      swiss-cantons-basel: 0
      swiss-public-and-domestic-payers: 0
      novartis: 0
      pbms-and-payers: 0
      patient-advocacy: +1
      eu-reference-pricing: 0
      biosimilars-competitors: 0
      investors: 0
    evidence_anchors:
      - description: IRA capped Part D OOP at $2,000 starting 2025
        source: https://www.cms.gov

  - id: pipeline_pricing_protocol
    name: Pipeline pricing protocols
    description: |
      Whether a forward-looking framework exists for negotiating prices on
      not-yet-approved Roche drugs (Alzheimer's trontinemab successor, next-gen
      oncology) before launch. 0 = no such framework; 10 = full pre-launch
      ceiling-price negotiation with CMS/HHS.
    units: ordinal 0-10
    range: [0, 10]
    default: 0   # no such framework today
    direction_for:
      roche: -1   # ceiling-price commitments reduce launch flexibility
      us-executive: +1
      us-congress: +1
      swiss-federal-council: 0
      swiss-cantons-basel: 0
      swiss-public-and-domestic-payers: 0
      novartis: -1
      pbms-and-payers: 0
      patient-advocacy: +1
      eu-reference-pricing: 0
      biosimilars-competitors: 0
      investors: -1
    evidence_anchors:
      - description: Currently no pre-launch CMS price ceiling; new biologics launch at company-set US list, subject to IRA after 13 years
        source: https://www.cms.gov

  - id: patent_exclusivity
    name: Patent and exclusivity treatment
    description: |
      Treatment of Roche's small-molecule "pill penalty" (9 years vs biologics
      13 years under IRA) and biosimilar/generic entry timing. Higher = more
      favorable to Roche (longer protection, no pill penalty changes).
    units: ordinal 0-10 (0 = aggressive shortening, 10 = preserve current)
    range: [0, 10]
    default: 7   # current law preserves but EPIC Act + IRA Round 3 erode at margin
    direction_for:
      roche: +1
      us-executive: 0
      us-congress: 0   # split: GOP pharma-state +, progressives -
      swiss-federal-council: +1
      swiss-cantons-basel: +1
      swiss-public-and-domestic-payers: 0
      novartis: +1
      pbms-and-payers: 0
      patient-advocacy: -1
      eu-reference-pricing: 0
      biosimilars-competitors: -1
      investors: +1
    evidence_anchors:
      - description: EPIC Act (S.832) seeks to soften IRA pill-penalty timeline for small molecules
        source: https://www.congress.gov

  - id: ip_innovation_protection
    name: IP / innovation protections
    description: |
      Treatment of march-in rights, compulsory licensing posture, patent-listing
      practices, biosimilar interchangeability pathway. Higher = stronger
      brand-IP protection.
    units: ordinal 0-10
    range: [0, 10]
    default: 7
    direction_for:
      roche: +1
      us-executive: -1   # admin has rhetorically threatened march-in
      us-congress: 0
      swiss-federal-council: +1
      swiss-cantons-basel: +1
      swiss-public-and-domestic-payers: 0
      novartis: +1
      pbms-and-payers: 0
      patient-advocacy: -1
      eu-reference-pricing: 0
      biosimilars-competitors: -1   # weak IP = faster biosimilar entry
      investors: +1
    evidence_anchors:
      - description: Trump admin has periodically referenced march-in rights as MFN-enforcement threat
        source: https://www.whitehouse.gov

  - id: swiss_diplomatic_carveout
    name: Swiss diplomatic carve-outs
    description: |
      Swiss-government-to-USTR framework provisions that shield Swiss firms
      specifically (vs all WTO-MFN treatment): 0% MFN-deal Section 232 track,
      bilateral pharma protocol annex, joint declaration on regulatory mutual
      recognition, etc. Higher = stronger Swiss-specific protection.
    units: ordinal 0-10
    range: [0, 10]
    default: 6   # Nov 2025 framework gave 15% cap + 0% MFN-deal track
    direction_for:
      roche: +1
      us-executive: -1
      us-congress: 0
      swiss-federal-council: +1
      swiss-cantons-basel: +1
      swiss-public-and-domestic-payers: 0
      novartis: +1
      pbms-and-payers: 0
      patient-advocacy: 0
      eu-reference-pricing: -1   # EU resents bilateral carve-outs
      biosimilars-competitors: 0
      investors: +1
    evidence_anchors:
      - description: US-Switzerland-Liechtenstein Joint Statement 2025-11-14 capped pharma tariffs at 15%; bilateral framework with capacity-build exemption track
        source: https://www.seco.admin.ch

  - id: swiss_domestic_pricing
    name: Swiss domestic pricing (LAMal / BAG list)
    description: |
      Change to Roche prices on the Swiss Spezialitätenliste (SL) under LAMal/OKP,
      relative to the May 2026 baseline. Positive = price increase (e.g., to
      protect US MFN benchmark); negative = price decrease (Swiss consumer-payer
      pressure). This issue captures the counterintuitive two-way spillover risk.
    units: percent change in BAG-set Roche prices vs 2026-05-19 baseline
    range: [-20, +20]
    default: 0
    direction_for:
      roche: +1
      us-executive: -1   # admin wants lower Swiss prices so MFN benchmark drops with it
      us-congress: 0
      swiss-federal-council: 0   # cross-pressured
      swiss-cantons-basel: +1    # higher prices = more cantonal corporate tax
      swiss-public-and-domestic-payers: -1
      novartis: +1
      pbms-and-payers: 0
      patient-advocacy: 0
      eu-reference-pricing: -1
      biosimilars-competitors: 0
      investors: +1
    evidence_anchors:
      - description: Schinecker publicly raised Swiss-price-increase question Oct 2025; major political pushback from CH consumer protection
        source: https://www.20min.ch
