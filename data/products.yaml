rollups:
  top_5_growth_drivers:
    drugs: [Phesgo, Xolair, Ocrevus, Hemlibra, Vabysmo]
    fy25_chfb: 21.4  # Roche-disclosed combined total
    fy25_us_chfb: 14.18  # sum of US lines
    pct_of_pharma: 0.449
    source: "Roche FY25 IR Update, 29 Jan 2026"

  top_10:
    fy25_chfb: 33.0  # approximate sum of top-10 by global sales
    pct_of_pharma: 0.692

  high_wac_biologics_ex_us:
    drugs: [Ocrevus, Hemlibra, Vabysmo, Tecentriq, Phesgo, Perjeta]
    fy25_ex_us_chfb: 7.3  # approximate sum of (global - US) for these six
    note: |
      Primary reference-pricing-contagion exposure: high-WAC biologics where confidential
      ex-US net prices anchor the affordability case. Spillover impact = 20-40% × this base.

  us_pharma_concentration_top_5:
    fy25_us_chfb: 15.21  # Ocrevus 4.874 + Hemlibra 2.665 + Vabysmo 2.857 + Xolair 3.075 + Tecentriq 1.640
    pct_of_us_pharma: 0.600
    note: |
      60% of US Pharma revenue is concentrated in the top-5 single-source biologics.
      Section 232 and MFN scope-creep both have asymmetric impact on this concentration.
